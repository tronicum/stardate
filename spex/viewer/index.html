<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>spex — point cloud explorer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0e12; color: #e6e6e6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
    #app { position: relative; width: 100vw; height: 100vh; }
    canvas { display: block; }
    #hud { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.55); padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; pointer-events: none; user-select: none; white-space: nowrap; }
    #controls { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.55); padding: 10px 14px; border-radius: 8px; font-size: 13px; display: flex; flex-direction: column; gap: 10px; min-width: 220px; }
    #controls label { display: flex; justify-content: space-between; gap: 10px; }
    #status { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.55); padding: 8px 12px; border-radius: 8px; font-size: 12px; max-width: 60vw; }
    #labels { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .node-label { position: absolute; transform: translate(-50%, -100%); background: rgba(0,0,0,0.75); color: #fff; font-size: 11px; line-height: 1.5; padding: 6px 10px; border-radius: 6px; white-space: pre-wrap; text-align: left; max-width: 320px; word-break: break-word; }
    .node-label::first-line { font-weight: 600; }
    #graph-meta { display: none; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.55); padding: 10px 16px; border-radius: 8px; font-size: 13px; text-align: center; pointer-events: none; user-select: none; max-width: min(70vw, 560px); }
    #graph-title { font-weight: 600; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #graph-legend { display: flex; align-items: center; gap: 8px; font-size: 11px; opacity: 0.85; }
    #legend-bar { flex: 1; height: 8px; border-radius: 4px; background: linear-gradient(to right, rgb(40,110,255), rgb(255,220,0), rgb(255,40,40)); }
    #legend-caption { font-size: 11px; opacity: 0.7; margin-top: 4px; }
    #cycle-indicator { display: none; position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.55); padding: 8px 12px; border-radius: 8px; font-size: 12px; pointer-events: none; user-select: none; }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud"></div>
    <div id="cycle-indicator">cycling · next demo in <span id="cycle-countdown"></span>s</div>
    <div id="graph-meta">
      <div id="graph-title"></div>
      <div id="graph-legend">
        <span id="legend-min"></span>
        <div id="legend-bar"></div>
        <span id="legend-max"></span>
      </div>
      <div id="legend-caption"></div>
    </div>
    <div id="controls">
      <label>Point size <input id="pointSize" type="range" min="0.5" max="8" step="0.1" value="2" /></label>
      <label>Point budget (M) <input id="pointBudget" type="range" min="0.2" max="10" step="0.1" value="2" /></label>
      <label>Labels (hover) <input id="showLabels" type="checkbox" checked /></label>
      <label>Animate packet <input id="animatePacket" type="checkbox" checked /></label>
    </div>
    <div id="status">loading tileset…</div>
    <div id="labels"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
